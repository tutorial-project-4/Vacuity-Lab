name: OpenAI Code Review

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check secret
        shell: bash
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY secret is missing."
            exit 1
          fi

      - name: Build PR diff
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"

          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"
          echo "MERGE_BASE=$MERGE_BASE"
          echo "Changed files:"
          git diff --name-status "$MERGE_BASE" "$HEAD_SHA" \
            -- . \
            ':(exclude)package-lock.json' \
            ':(exclude)yarn.lock' \
            ':(exclude)pnpm-lock.yaml' \
            ':(exclude)dist/**' \
            ':(exclude)build/**'

          git diff --unified=0 "$MERGE_BASE" "$HEAD_SHA" \
            -- . \
            ':(exclude)package-lock.json' \
            ':(exclude)yarn.lock' \
            ':(exclude)pnpm-lock.yaml' \
            ':(exclude)dist/**' \
            ':(exclude)build/**' \
            > pr.diff

          if [ ! -s pr.diff ]; then
            echo "No meaningful diff found." > pr.diff
          fi

          wc -c pr.diff

          python3 - <<'PY'
          from pathlib import Path

          p = Path("pr.diff")
          text = p.read_text(encoding="utf-8", errors="ignore")

          limit = 120000
          if len(text) > limit:
              text = text[:limit] + "\n\n[TRUNCATED]"

          p.write_text(text, encoding="utf-8")
          PY

      - name: Ask OpenAI for review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          diff_text = Path("pr.diff").read_text(encoding="utf-8", errors="ignore")

          instructions = (
              "You are a senior software engineer reviewing a GitHub pull request. "
              "Focus on bugs, regressions, security, performance, maintainability, "
              "and missing tests. Be concrete. The entire response must be written in Korean."
          )

          user_prompt = "\n".join([
              "Review the diff and return:",
              "1. A short summary",
              "2. Critical issues",
              "3. Improvement suggestions",
              "4. A final verdict",
              "",
              "Rules:",
              "- Be concrete and reference actual changed code patterns from the diff.",
              "- If there are no serious issues, say so clearly.",
              "- Keep the review concise but useful.",
              "- Format in Markdown.",
              "",
              "PR diff:",
              "```diff",
              diff_text,
              "```",
          ])

          body = {
              "model": "gpt-5.4-mini",
              "instructions": instructions,
              "input": user_prompt,
          }

          Path("openai_request.json").write_text(
              json.dumps(body, ensure_ascii=False),
              encoding="utf-8"
          )
          PY

          MAX_RETRIES=4
          BASE_DELAY=10
          HTTP_STATUS=0

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "OpenAI request attempt $attempt/$MAX_RETRIES"

            HTTP_STATUS=$(curl -sS -o openai_response.json -w "%{http_code}" \
              -X POST "https://api.openai.com/v1/responses" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" \
              -d @openai_request.json)

            echo "HTTP_STATUS=$HTTP_STATUS"
            cat openai_response.json || true

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "OpenAI request succeeded"
              break
            fi

            if [ "$HTTP_STATUS" -eq 429 ] || [ "$HTTP_STATUS" -eq 500 ] || [ "$HTTP_STATUS" -eq 502 ] || [ "$HTTP_STATUS" -eq 503 ] || [ "$HTTP_STATUS" -eq 504 ]; then
              if [ $attempt -lt $MAX_RETRIES ]; then
                DELAY=$((BASE_DELAY * attempt))
                echo "Temporary API error ($HTTP_STATUS). Retrying in ${DELAY}s..."
                sleep $DELAY
              fi
            else
              echo "Non-retryable error: HTTP_STATUS=$HTTP_STATUS"
              break
            fi
          done

          if [ "$HTTP_STATUS" -ne 200 ]; then
            python3 - <<'PY'
          import json
          from pathlib import Path

          raw = Path("openai_response.json").read_text(encoding="utf-8", errors="ignore") if Path("openai_response.json").exists() else ""
          detail = raw[:2000] if raw else "No response body"

          text = (
              "OpenAI API가 일시적으로 응답하지 않아 자동 코드 리뷰를 생성하지 못했습니다.\n\n"
              "- 원인: OpenAI API 요청 실패\n"
              "- 조치: GitHub Actions에서 job 재실행 필요\n"
              "- 참고: 일시적인 429/5xx 오류는 재시도 시 복구되는 경우가 많습니다.\n\n"
              "<details><summary>오류 상세</summary>\n\n"
              "```text\n"
              + detail
              + "\n```\n"
              "</details>"
          )

          final = "## OpenAI 코드 리뷰\n\n<!-- openai-review-bot -->\n\n" + text
          Path("review.md").write_text(final, encoding="utf-8")
          PY
            exit 0
          fi

          python3 .github/scripts/review_output_parser.py openai_response.json review.md

      - name: Create or update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            const marker = '<!-- openai-review-bot -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
